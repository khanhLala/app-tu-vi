openapi: 3.0.3
info:
  title: Tử Vi App API Specification
  description: Tài liệu chi tiết các API dành cho hệ thống Tử Vi (Backend & Engine)
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local Backend Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          example: 1000
        message:
          type: string
        result:
          type: object

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }

    RegisterRequest:
      type: object
      required: [username, password, email]
      properties:
        username: { type: string }
        password: { type: string }
        email: { type: string }
        firstName: { type: string }
        lastName: { type: string }

    TuViRequest:
      type: object
      required: [name, date, time, gender]
      properties:
        name: { type: string }
        date: { type: string, example: "1995-10-25" }
        time: { type: string, example: "08:30" }
        gender: { type: string, enum: [Nam, Nữ] }

    PostRequest:
      type: object
      required: [content]
      properties:
        content: { type: string }
        chartData: { type: object, description: "Dữ liệu lá số đính kèm" }

    CommentRequest:
      type: object
      required: [content]
      properties:
        content: { type: string }

paths:
  # Authentication
  /auth/login:
    post:
      tags: [Authentication]
      summary: Đăng nhập hệ thống
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        200:
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /auth/register:
    post:
      tags: [Authentication]
      summary: Đăng ký tài khoản mới
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        200:
          description: Created

  # Tu Vi Engine
  /tuvi/generate:
    post:
      tags: [Tu Vi]
      summary: Lập lá số Tử Vi mới
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TuViRequest' }
      responses:
        200:
          description: Trả về dữ liệu chi tiết các cung và sao

  /tuvi/history:
    get:
      tags: [Tu Vi]
      summary: Lấy danh sách lịch sử lập lá số
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Danh sách các Profile đã lưu

  # Community Posts
  /posts:
    get:
      tags: [Community]
      summary: Lấy feed bài đăng cộng đồng
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Danh sách bài đăng và bình luận
    post:
      tags: [Community]
      summary: Tạo bài đăng mới (có thể đính kèm lá số)
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PostRequest' }
      responses:
        200:
          description: Bài đăng đã tạo thành công

  /posts/{postId}/like:
    post:
      tags: [Community]
      summary: Thích/Bỏ thích bài viết
      security: [{ bearerAuth: [] }]
      parameters:
        - name: postId
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: Thao tác thành công

  # User Profile
  /users/my-info:
    get:
      tags: [User]
      summary: Lấy thông tin cá nhân hiện tại
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Profile người dùng

  /users/avatar:
    post:
      tags: [User]
      summary: Cập nhật ảnh đại diện
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses:
        200:
          description: Avatar đã được cập nhật
